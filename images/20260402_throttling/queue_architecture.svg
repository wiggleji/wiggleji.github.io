<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="Fira Code, monospace">
  <defs>
    <marker id="aw" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#d4a017"/></marker>
    <marker id="ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#2e7d32"/></marker>
    <marker id="ap" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#7d3c98"/></marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#c0392b"/></marker>
    <marker id="ad" markerWidth="7" markerHeight="5" refX="3.5" refY="0" orient="auto"><path d="M0,0 L3.5,5 L7,0" fill="#999"/></marker>
  </defs>

  <rect width="680" height="520" fill="#fefefe"/>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#333" font-size="13" font-weight="700">Queue-based Throttling Architecture</text>
  <text x="340" y="40" text-anchor="middle" fill="#aaa" font-size="9">유저 → 대기열 → 스케줄러 → 토큰 → 관문 → 주문</text>

  <!-- === USER === -->
  <rect x="24" y="68" width="90" height="52" rx="8" fill="#fafaf7" stroke="#333" stroke-width="1.2"/>
  <text x="69" y="92" text-anchor="middle" fill="#333" font-size="12" font-weight="700">유저</text>
  <text x="69" y="106" text-anchor="middle" fill="#999" font-size="8">(Client)</text>

  <!-- Arrow: User → Waiting Room -->
  <line x1="114" y1="94" x2="166" y2="94" stroke="#d4a017" stroke-width="1.5" marker-end="url(#aw)"/>
  <rect x="120" y="76" width="18" height="14" rx="3" fill="#fffcf7" stroke="#d4a017" stroke-width="0.8"/>
  <text x="129" y="86" text-anchor="middle" fill="#d4a017" font-size="8" font-weight="700">1</text>

  <!-- === WAITING ROOM === -->
  <rect x="176" y="60" width="280" height="68" rx="8" fill="#fffcf7" stroke="#d4a017" stroke-width="1.5"/>
  <text x="316" y="82" text-anchor="middle" fill="#d4a017" font-size="12" font-weight="700">Waiting Room</text>
  <text x="316" y="97" text-anchor="middle" fill="#999" font-size="9">Redis Sorted Set — ZADD NX, ZRANK</text>
  <text x="316" y="112" text-anchor="middle" fill="#bbb" font-size="8">score = timestamp, member = userId</text>

  <!-- Queue people -->
  <g transform="translate(468, 74)" fill="#d4a017" opacity="0.4">
    <rect x="0" y="0" width="7" height="22" rx="2"/><rect x="10" y="0" width="7" height="22" rx="2"/>
    <rect x="20" y="0" width="7" height="22" rx="2"/><rect x="30" y="0" width="7" height="22" rx="2"/>
    <rect x="40" y="0" width="7" height="22" rx="2"/><rect x="50" y="0" width="7" height="22" rx="2"/>
  </g>

  <!-- Vertical arrow: Waiting → Scheduler -->
  <line x1="316" y1="128" x2="316" y2="160" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ad)"/>
  <rect x="326" y="134" width="18" height="14" rx="3" fill="#f4faf4" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="335" y="145" text-anchor="middle" fill="#2e7d32" font-size="8" font-weight="700">2</text>

  <!-- === SCHEDULER === -->
  <rect x="206" y="168" width="220" height="50" rx="8" fill="#f4faf4" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="316" y="190" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="700">스케줄러</text>
  <text x="316" y="206" text-anchor="middle" fill="#999" font-size="9">100ms마다 ZPOPMIN 18명</text>

  <!-- Vertical arrow: Scheduler → Active Zone -->
  <line x1="316" y1="218" x2="316" y2="248" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ad)"/>
  <rect x="326" y="224" width="18" height="14" rx="3" fill="#fffcf7" stroke="#e67e22" stroke-width="0.8"/>
  <text x="335" y="235" text-anchor="middle" fill="#e67e22" font-size="8" font-weight="700">3</text>

  <!-- === ACTIVE ZONE === -->
  <rect x="176" y="256" width="280" height="68" rx="8" fill="#fffcf7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="316" y="278" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="700">Active Zone (토큰 발급)</text>
  <text x="316" y="293" text-anchor="middle" fill="#999" font-size="9">Redis String — SET UUID EX 300</text>
  <text x="316" y="308" text-anchor="middle" fill="#bbb" font-size="8">entry-token:{userId} = UUID, TTL 5분</text>

  <!-- User dotted line down to interceptor level -->
  <line x1="69" y1="120" x2="69" y2="388" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrow: User → Interceptor -->
  <line x1="69" y1="388" x2="166" y2="388" stroke="#7d3c98" stroke-width="1.5" marker-end="url(#ap)"/>
  <rect x="98" y="370" width="42" height="14" rx="3" fill="#fcf8ff" stroke="#7d3c98" stroke-width="0.8"/>
  <text x="119" y="380" text-anchor="middle" fill="#7d3c98" font-size="7" font-weight="700">4 +토큰</text>

  <!-- === INTERCEPTOR (GATE) === -->
  <rect x="176" y="358" width="280" height="56" rx="8" fill="#fcf8ff" stroke="#7d3c98" stroke-width="1.5"/>
  <text x="316" y="382" text-anchor="middle" fill="#7d3c98" font-size="12" font-weight="700">관문 (Interceptor)</text>
  <text x="316" y="400" text-anchor="middle" fill="#999" font-size="9">토큰 검증 → 통과 / 거부</text>

  <!-- Rejected arrow -->
  <line x1="456" y1="376" x2="510" y2="376" stroke="#c0392b" stroke-width="1.2" marker-end="url(#ar)"/>
  <rect x="518" y="364" width="86" height="26" rx="5" fill="#fef5f5" stroke="#c0392b" stroke-width="1"/>
  <text x="561" y="382" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="700">400 거부</text>

  <!-- Vertical arrow: Interceptor → Order -->
  <line x1="316" y1="414" x2="316" y2="446" stroke="#999" stroke-width="1.2" marker-end="url(#ad)"/>
  <rect x="326" y="420" width="18" height="14" rx="3" fill="#f4faf4" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="335" y="431" text-anchor="middle" fill="#2e7d32" font-size="8" font-weight="700">5</text>

  <!-- === ORDER PROCESSING === -->
  <rect x="216" y="452" width="200" height="42" rx="8" fill="#f4faf4" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="316" y="478" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="700">주문 처리 (DB)</text>

  <!-- Token DEL arrow — from Order right edge, up across Interceptor→400 line, into Active Zone -->
  <path d="M416,473 L480,473 L480,376 L480,310" fill="none" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="496" y="346" fill="#c0392b" font-size="8" font-weight="600">DEL token</text>

  <!-- Step legend (right side) -->
  <g transform="translate(530, 62)">
    <text x="0" y="0" fill="#d4a017" font-size="9"><tspan font-weight="700">1.</tspan> 대기열 진입</text>
    <text x="0" y="20" fill="#2e7d32" font-size="9"><tspan font-weight="700">2.</tspan> 18명 추출</text>
    <text x="0" y="40" fill="#e67e22" font-size="9"><tspan font-weight="700">3.</tspan> 토큰 발급</text>
    <text x="0" y="60" fill="#7d3c98" font-size="9"><tspan font-weight="700">4.</tspan> 주문 요청</text>
    <text x="0" y="80" fill="#2e7d32" font-size="9"><tspan font-weight="700">5.</tspan> 주문 + 토큰삭제</text>
  </g>
</svg>
