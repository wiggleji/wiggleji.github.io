<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 -10 640 140" width="640" xmlns="http://www.w3.org/2000/svg"
     style="background:#fffefc; font-family:'Roboto',sans-serif;">

  <defs>
    <style>
      .t-base  { fill: #586e75; font-family: 'Roboto', sans-serif; font-size: 12px; }
      .t-green { fill: #859900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-red   { fill: #dc322f; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-amber { fill: #b58900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-muted { fill: #93a1a1; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-mono  { fill: #657b83; font-family: 'Roboto Mono', monospace; font-size: 10.5px; }
      .n-gray   { fill: #e4deca; stroke: #c5bcaa; }
      .n-green  { fill: rgba(133,153,0,.12);  stroke: rgba(133,153,0,.5); }
      .n-teal   { fill: rgba(42,161,152,.12); stroke: rgba(42,161,152,.5); }
      .n-purple { fill: rgba(108,113,196,.12);stroke: rgba(108,113,196,.5); }
      .n-red    { fill: rgba(220,50,47,.12);  stroke: rgba(220,50,47,.5); }
      .n-amber  { fill: rgba(181,137,0,.12);  stroke: rgba(181,137,0,.5); }
      .arr { stroke: #93a1a1; stroke-width: 1; fill: none; }
      text { font-family: 'Roboto', sans-serif; }
    </style>
  </defs>


      <defs>
        <marker id="arr4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <rect x="10" y="20" width="64" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="42" y="36" text-anchor="middle" dominant-baseline="central" class="t-base">Caller</text>

      <line x1="74" y1="36" x2="108" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr4)"/>

      <rect x="108" y="20" width="104" height="32" rx="5" class="n-amber" stroke-width="0.6"/>
      <text x="160" y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--amber)">TimeLimiter</text>

      <line x1="212" y1="36" x2="246" y2="36" stroke="#b58900" stroke-width="1" marker-end="url(#arr4)"/>

      <!-- Future bracket -->
      <rect x="246" y="8" width="196" height="52" rx="6" fill="none" stroke="#b58900" stroke-width="0.7" stroke-dasharray="4 3"/>
      <text x="344" y="5" text-anchor="middle" class="t-amber" style="font-size:10px">timeoutDuration 감시 중</text>

      <rect x="252" y="20" width="130" height="32" rx="5" class="n-purple" stroke-width="0.6"/>
      <text x="317" y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--purple)">CompletableFuture</text>

      <!-- timer watch -->
      <path d="M160 52 L160 80 L317 80 L317 54" fill="none" stroke="#94a3b8" stroke-width="0.7" stroke-dasharray="3 3"/>

      <!-- timeout -->
      <line x1="160" y1="80" x2="160" y2="100" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr4)"/>
      <rect x="108" y="100" width="104" height="14" rx="4" class="n-red" stroke-width="0.6"/>
      <text x="160" y="107" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--red);font-size:10px">TimeoutException</text>

      <!-- cancel -->
      <line x1="380" y1="80" x2="380" y2="54" stroke="var(--red)" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arr4)"/>
      <text x="398" y="74" class="t-red" style="font-size:10px">cancel()</text>

      <!-- success -->
      <line x1="382" y1="36" x2="420" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr4)"/>
      <rect x="420" y="20" width="72" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="456" y="36" text-anchor="middle" dominant-baseline="central" class="t-base">External</text>
    
</svg>