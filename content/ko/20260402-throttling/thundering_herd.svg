<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg" font-family="Fira Code, monospace">
  <rect width="780" height="380" fill="#fefefe"/>

  <!-- Title -->
  <text x="390" y="24" text-anchor="middle" fill="#333" font-size="13" font-weight="700">Thundering Herd vs Micro-Batching</text>
  <text x="390" y="40" text-anchor="middle" fill="#aaa" font-size="9">목표 처리량 175 TPS | DB 커넥션 풀 50개</text>

  <!-- Divider -->
  <line x1="390" y1="52" x2="390" y2="268" stroke="#ddd" stroke-width="1"/>
  <text x="390" y="282" text-anchor="middle" fill="#ccc" font-size="11" font-weight="700">vs</text>

  <!-- ====== LEFT: Thundering Herd ====== -->
  <text x="180" y="64" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="700">1초마다 175명 한번에</text>

  <!-- DB Pool label -->
  <text x="180" y="86" text-anchor="middle" fill="#999" font-size="9">DB 커넥션 풀 (50개)</text>
  <rect x="30" y="92" width="300" height="14" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="0.8"/>
  <rect x="30" y="92" width="86" height="14" rx="3" fill="#2980b9" opacity="0.3"/>
  <text x="73" y="103" text-anchor="middle" fill="#2980b9" font-size="7" font-weight="600">50개</text>

  <!-- t=0s: empty -->
  <text x="18" y="132" fill="#999" font-size="10" text-anchor="end">0s</text>
  <rect x="30" y="120" width="300" height="18" rx="3" fill="#f8f8f8" stroke="#eee" stroke-width="0.8"/>
  <text x="180" y="133" text-anchor="middle" fill="#ccc" font-size="9">0건</text>

  <!-- t=1s: FULL BURST -->
  <text x="18" y="162" fill="#c0392b" font-size="10" text-anchor="end" font-weight="700">1s</text>
  <rect x="30" y="150" width="300" height="18" rx="3" fill="#c0392b" opacity="0.6"/>
  <text x="180" y="163" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">175건 동시!</text>

  <!-- t=2s: FULL BURST again -->
  <text x="18" y="192" fill="#c0392b" font-size="10" text-anchor="end" font-weight="700">2s</text>
  <rect x="30" y="180" width="300" height="18" rx="3" fill="#c0392b" opacity="0.6"/>
  <text x="180" y="193" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">175건 동시!</text>

  <!-- Left warning -->
  <rect x="40" y="214" width="280" height="34" rx="6" fill="#fef5f5" stroke="#c0392b" stroke-width="1"/>
  <text x="180" y="228" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="700">순간 피크 = 175건</text>
  <text x="180" y="242" text-anchor="middle" fill="#c0392b" font-size="8">커넥션 풀 3.5배 초과 → 다른 API 전부 대기</text>

  <!-- ====== RIGHT: Micro-Batching ====== -->
  <text x="590" y="64" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="700">100ms마다 18명씩</text>

  <!-- DB Pool label -->
  <text x="590" y="86" text-anchor="middle" fill="#999" font-size="9">DB 커넥션 풀 (50개)</text>
  <rect x="440" y="92" width="300" height="14" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="0.8"/>
  <rect x="440" y="92" width="86" height="14" rx="3" fill="#2980b9" opacity="0.3"/>
  <text x="483" y="103" text-anchor="middle" fill="#2980b9" font-size="7" font-weight="600">50개</text>

  <!-- Micro batches -->
  <text x="428" y="124" fill="#999" font-size="9" text-anchor="end">0.0s</text>
  <rect x="440" y="114" width="300" height="13" rx="2" fill="#f8f8f8" stroke="#eee" stroke-width="0.5"/>
  <rect x="440" y="114" width="30" height="13" rx="2" fill="#2e7d32" opacity="0.5"/>

  <text x="428" y="141" fill="#999" font-size="9" text-anchor="end">0.1s</text>
  <rect x="440" y="131" width="300" height="13" rx="2" fill="#f8f8f8" stroke="#eee" stroke-width="0.5"/>
  <rect x="440" y="131" width="30" height="13" rx="2" fill="#2e7d32" opacity="0.5"/>

  <text x="428" y="158" fill="#999" font-size="9" text-anchor="end">0.2s</text>
  <rect x="440" y="148" width="300" height="13" rx="2" fill="#f8f8f8" stroke="#eee" stroke-width="0.5"/>
  <rect x="440" y="148" width="30" height="13" rx="2" fill="#2e7d32" opacity="0.5"/>

  <text x="428" y="175" fill="#999" font-size="9" text-anchor="end">0.3s</text>
  <rect x="440" y="165" width="300" height="13" rx="2" fill="#f8f8f8" stroke="#eee" stroke-width="0.5"/>
  <rect x="440" y="165" width="30" height="13" rx="2" fill="#2e7d32" opacity="0.5"/>

  <text x="428" y="192" fill="#999" font-size="9" text-anchor="end">...</text>
  <rect x="440" y="182" width="300" height="13" rx="2" fill="#f8f8f8" stroke="#eee" stroke-width="0.5"/>
  <rect x="440" y="182" width="30" height="13" rx="2" fill="#2e7d32" opacity="0.5"/>

  <text x="428" y="209" fill="#999" font-size="9" text-anchor="end">0.9s</text>
  <rect x="440" y="199" width="300" height="13" rx="2" fill="#f8f8f8" stroke="#eee" stroke-width="0.5"/>
  <rect x="440" y="199" width="30" height="13" rx="2" fill="#2e7d32" opacity="0.5"/>

  <!-- 18 label -->
  <text x="480" y="158" fill="#2e7d32" font-size="9" font-weight="600">18건</text>

  <!-- Right result -->
  <rect x="450" y="224" width="280" height="34" rx="6" fill="#f4faf4" stroke="#2e7d32" stroke-width="1"/>
  <text x="590" y="238" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="700">순간 피크 = 18건</text>
  <text x="590" y="252" text-anchor="middle" fill="#2e7d32" font-size="8">커넥션 풀 36% → 다른 API 정상 동작</text>

  <!-- Bottom formula -->
  <rect x="150" y="300" width="480" height="60" rx="8" fill="#fafaf7" stroke="#ddd" stroke-width="1"/>
  <text x="390" y="324" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="700">Batch Size = Target TPS / Frequency = 175 / 10 ≈ 18</text>
  <text x="390" y="344" text-anchor="middle" fill="#999" font-size="10">1초(1,000ms)를 10회로 나누어 DB 커넥션 점유를 균등 분산</text>
</svg>
