<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" font-family="Fira Code, monospace">
  <rect width="700" height="280" fill="#fefefe"/>

  <!-- Title -->
  <text x="350" y="24" text-anchor="middle" fill="#333" font-size="13" font-weight="700">String — Key:Value 1:1 매핑</text>
  <text x="350" y="40" text-anchor="middle" fill="#aaa" font-size="9">모든 연산 O(1) | 최대 512MB</text>

  <!-- Key-Value pairs -->
  <rect x="60" y="60" width="260" height="36" rx="6" fill="#fffcf7" stroke="#e67e22" stroke-width="1.2"/>
  <text x="80" y="82" fill="#e67e22" font-size="10" font-weight="600">KEY</text>
  <text x="190" y="82" fill="#333" font-size="10">user:1001:name</text>

  <rect x="380" y="60" width="260" height="36" rx="6" fill="#f4faf4" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="400" y="82" fill="#2e7d32" font-size="10" font-weight="600">VALUE</text>
  <text x="490" y="82" fill="#333" font-size="10">"wiggleji"</text>

  <line x1="324" y1="78" x2="376" y2="78" stroke="#ccc" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Encoding variants -->
  <text x="350" y="126" text-anchor="middle" fill="#999" font-size="10" font-weight="600">내부 인코딩 (값에 따라 자동 선택)</text>
  <line x1="60" y1="134" x2="640" y2="134" stroke="#eee" stroke-width="1"/>

  <!-- int -->
  <rect x="60" y="146" width="180" height="50" rx="6" fill="#fff" stroke="#2980b9" stroke-width="1"/>
  <text x="150" y="166" text-anchor="middle" fill="#2980b9" font-size="10" font-weight="700">int</text>
  <text x="150" y="184" text-anchor="middle" fill="#999" font-size="8">정수 0~10000</text>

  <!-- embstr -->
  <rect x="260" y="146" width="180" height="50" rx="6" fill="#fff" stroke="#8e44ad" stroke-width="1"/>
  <text x="350" y="166" text-anchor="middle" fill="#8e44ad" font-size="10" font-weight="700">embstr</text>
  <text x="350" y="184" text-anchor="middle" fill="#999" font-size="8">문자열 &lt;= 44 bytes</text>

  <!-- raw -->
  <rect x="460" y="146" width="180" height="50" rx="6" fill="#fff" stroke="#c0392b" stroke-width="1"/>
  <text x="550" y="166" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="700">raw</text>
  <text x="550" y="184" text-anchor="middle" fill="#999" font-size="8">문자열 &gt; 44 bytes</text>

  <!-- Use cases -->
  <line x1="60" y1="210" x2="640" y2="210" stroke="#eee" stroke-width="1"/>
  <rect x="60" y="222" width="130" height="28" rx="5" fill="#2980b9" opacity="0.1" stroke="#2980b9" stroke-width="0.8"/>
  <text x="125" y="240" text-anchor="middle" fill="#2980b9" font-size="9" font-weight="600">Cache</text>

  <rect x="210" y="222" width="130" height="28" rx="5" fill="#2e7d32" opacity="0.1" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="275" y="240" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="600">Counter (INCR)</text>

  <rect x="360" y="222" width="130" height="28" rx="5" fill="#8e44ad" opacity="0.1" stroke="#8e44ad" stroke-width="0.8"/>
  <text x="425" y="240" text-anchor="middle" fill="#8e44ad" font-size="9" font-weight="600">분산 Lock (SETNX)</text>

  <rect x="510" y="222" width="130" height="28" rx="5" fill="#e67e22" opacity="0.1" stroke="#e67e22" stroke-width="0.8"/>
  <text x="575" y="240" text-anchor="middle" fill="#e67e22" font-size="9" font-weight="600">Session TTL</text>

  <!-- Key insight -->
  <text x="350" y="272" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="700">RDB 비유: 단일 컬럼 값 조회 — SELECT name FROM users WHERE id = 1001</text>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#ccc"/></marker>
  </defs>
</svg>
