<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 232" width="640" xmlns="http://www.w3.org/2000/svg"
     style="background:#fffefc; font-family:'Roboto',sans-serif;">

  <defs>
    <style>
      .t-base  { fill: #586e75; font-family: 'Roboto', sans-serif; font-size: 12px; }
      .t-green { fill: #859900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-red   { fill: #dc322f; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-amber { fill: #b58900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-muted { fill: #93a1a1; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-mono  { fill: #657b83; font-family: 'Roboto Mono', monospace; font-size: 10.5px; }
      .n-gray   { fill: #e4deca; stroke: #c5bcaa; }
      .n-green  { fill: rgba(133,153,0,.12);  stroke: rgba(133,153,0,.5); }
      .n-teal   { fill: rgba(42,161,152,.12); stroke: rgba(42,161,152,.5); }
      .n-purple { fill: rgba(108,113,196,.12);stroke: rgba(108,113,196,.5); }
      .n-red    { fill: rgba(220,50,47,.12);  stroke: rgba(220,50,47,.5); }
      .n-amber  { fill: rgba(181,137,0,.12);  stroke: rgba(181,137,0,.5); }
      .arr { stroke: #93a1a1; stroke-width: 1; fill: none; }
      text { font-family: 'Roboto', sans-serif; }
    </style>
  </defs>



      <!-- time axis -->
      <line x1="16" y1="36" x2="624" y2="36" stroke="#d3cbb8" stroke-width="1"/>

      <!-- ── CLOSED phase ── -->
      <!-- bracket -->
      <line x1="16"  y1="28" x2="16"  y2="36" stroke="#859900" stroke-width="1"/>
      <line x1="16"  y1="32" x2="280" y2="32" stroke="#859900" stroke-width="1"/>
      <line x1="280" y1="28" x2="280" y2="36" stroke="#859900" stroke-width="1"/>
      <text x="148" y="26" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="10" fill="#859900">CLOSED</text>

      <!-- sliding window: 10 calls, shown as individual bars -->
      <!-- calls 1-5: success (green) -->
      <rect x="16"  y="44" width="22" height="20" rx="3" fill="rgba(133,153,0,.13)"  stroke="#859900" stroke-width="0.7"/>
      <rect x="42"  y="44" width="22" height="20" rx="3" fill="rgba(133,153,0,.13)"  stroke="#859900" stroke-width="0.7"/>
      <rect x="68"  y="44" width="22" height="20" rx="3" fill="rgba(133,153,0,.13)"  stroke="#859900" stroke-width="0.7"/>
      <rect x="94"  y="44" width="22" height="20" rx="3" fill="rgba(133,153,0,.13)"  stroke="#859900" stroke-width="0.7"/>
      <rect x="120" y="44" width="22" height="20" rx="3" fill="rgba(133,153,0,.13)"  stroke="#859900" stroke-width="0.7"/>
      <!-- calls 6-10: fail (red) -->
      <rect x="146" y="44" width="22" height="20" rx="3" fill="rgba(220,50,47,.12)" stroke="#dc322f" stroke-width="0.7"/>
      <rect x="172" y="44" width="22" height="20" rx="3" fill="rgba(220,50,47,.12)" stroke="#dc322f" stroke-width="0.7"/>
      <rect x="198" y="44" width="22" height="20" rx="3" fill="rgba(220,50,47,.12)" stroke="#dc322f" stroke-width="0.7"/>
      <rect x="224" y="44" width="22" height="20" rx="3" fill="rgba(220,50,47,.12)" stroke="#dc322f" stroke-width="0.7"/>
      <rect x="250" y="44" width="22" height="20" rx="3" fill="rgba(220,50,47,.12)" stroke="#dc322f" stroke-width="0.7"/>
      <!-- labels -->
      <text x="81"  y="54" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="9" fill="#859900">성공×5</text>
      <text x="211" y="54" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="9" fill="#dc322f">실패×5</text>
      <!-- sliding window brace (above the slots) -->
      <line x1="16"  y1="68" x2="16"  y2="74" stroke="#93a1a1" stroke-width="0.8"/>
      <line x1="16"  y1="71" x2="272" y2="71" stroke="#93a1a1" stroke-width="0.8"/>
      <line x1="272" y1="68" x2="272" y2="74" stroke="#93a1a1" stroke-width="0.8"/>
      <text x="144" y="83" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#93a1a1">slidingWindowSize = 10</text>
      <!-- failure rate label — below the brace -->
      <text x="144" y="96" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="10" fill="#dc322f">실패율 50% ≥ threshold → OPEN 전환</text>

      <!-- state boundary: CLOSED → OPEN -->
      <line x1="280" y1="30" x2="280" y2="198" stroke="#dc322f" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="280" y="210" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#dc322f">OPEN</text>

      <!-- ── OPEN phase ── -->
      <line x1="280" y1="28" x2="280" y2="36" stroke="#dc322f" stroke-width="1"/>
      <line x1="280" y1="32" x2="460" y2="32" stroke="#dc322f" stroke-width="1"/>
      <line x1="460" y1="28" x2="460" y2="36" stroke="#dc322f" stroke-width="1"/>
      <text x="370" y="26" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="10" fill="#dc322f">OPEN (waitDurationInOpenState)</text>

      <!-- blocked calls during OPEN -->
      <rect x="290" y="44" width="160" height="20" rx="3" fill="rgba(220,50,47,.07)" stroke="#dc322f" stroke-width="0.6" stroke-dasharray="3 2"/>
      <text x="370" y="54" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#dc322f">모든 호출 차단 → fallback()</text>

      <!-- waitDurationInOpenState brace -->
      <line x1="280" y1="68" x2="280" y2="74" stroke="#dc322f" stroke-width="0.8"/>
      <line x1="280" y1="71" x2="460" y2="71" stroke="#dc322f" stroke-width="0.8"/>
      <line x1="460" y1="68" x2="460" y2="74" stroke="#dc322f" stroke-width="0.8"/>
      <text x="370" y="84" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#dc322f">waitDurationInOpenState (10s)</text>

      <!-- state boundary: OPEN → HALF-OPEN -->
      <line x1="460" y1="30" x2="460" y2="198" stroke="#b58900" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="460" y="210" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#b58900">HALF-OPEN</text>

      <!-- ── HALF-OPEN phase ── -->
      <line x1="460" y1="28" x2="460" y2="36" stroke="#b58900" stroke-width="1"/>
      <line x1="460" y1="32" x2="570" y2="32" stroke="#b58900" stroke-width="1"/>
      <line x1="570" y1="28" x2="570" y2="36" stroke="#b58900" stroke-width="1"/>
      <text x="515" y="26" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="10" fill="#b58900">HALF-OPEN</text>

      <!-- 3 probe calls -->
      <rect x="466" y="44" width="28" height="20" rx="3" fill="rgba(133,153,0,.13)"  stroke="#859900" stroke-width="0.7"/>
      <rect x="498" y="44" width="28" height="20" rx="3" fill="rgba(133,153,0,.13)"  stroke="#859900" stroke-width="0.7"/>
      <rect x="530" y="44" width="28" height="20" rx="3" fill="rgba(133,153,0,.13)"  stroke="#859900" stroke-width="0.7"/>
      <text x="515" y="54" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="9" fill="#859900">탐색 3회 성공</text>
      <!-- permittedCalls brace -->
      <line x1="466" y1="68" x2="466" y2="74" stroke="#b58900" stroke-width="0.8"/>
      <line x1="466" y1="71" x2="558" y2="71" stroke="#b58900" stroke-width="0.8"/>
      <line x1="558" y1="68" x2="558" y2="74" stroke="#b58900" stroke-width="0.8"/>
      <text x="512" y="84" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#b58900">permittedCalls = 3</text>

      <!-- → CLOSED again -->
      <line x1="570" y1="30" x2="570" y2="198" stroke="#859900" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="596" y="54" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#859900">CLOSED 복구</text>

      <!-- legend -->
      <rect x="16"  y="220" width="12" height="10" rx="2" fill="rgba(133,153,0,.13)"  stroke="#859900" stroke-width="0.7"/>
      <text x="32"  y="225" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="11" fill="#657b83">성공 호출</text>
      <rect x="110" y="220" width="12" height="10" rx="2" fill="rgba(220,50,47,.12)"  stroke="#dc322f" stroke-width="0.7"/>
      <text x="126" y="225" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="11" fill="#657b83">실패 호출 (sliding window에 기록)</text>
      <rect x="360" y="220" width="12" height="10" rx="2" fill="rgba(220,50,47,.07)" stroke="#dc322f" stroke-width="0.6" stroke-dasharray="3 2"/>
      <text x="376" y="225" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="11" fill="#657b83">OPEN 차단 구간</text>
    
</svg>