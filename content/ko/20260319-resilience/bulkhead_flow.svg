<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 -10 640 128" width="640" xmlns="http://www.w3.org/2000/svg"
     style="background:#fffefc; font-family:'Roboto',sans-serif;">

  <defs>
    <style>
      .t-base  { fill: #586e75; font-family: 'Roboto', sans-serif; font-size: 12px; }
      .t-green { fill: #859900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-red   { fill: #dc322f; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-amber { fill: #b58900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-muted { fill: #93a1a1; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-mono  { fill: #657b83; font-family: 'Roboto Mono', monospace; font-size: 10.5px; }
      .n-gray   { fill: #e4deca; stroke: #c5bcaa; }
      .n-green  { fill: rgba(133,153,0,.12);  stroke: rgba(133,153,0,.5); }
      .n-teal   { fill: rgba(42,161,152,.12); stroke: rgba(42,161,152,.5); }
      .n-purple { fill: rgba(108,113,196,.12);stroke: rgba(108,113,196,.5); }
      .n-red    { fill: rgba(220,50,47,.12);  stroke: rgba(220,50,47,.5); }
      .n-amber  { fill: rgba(181,137,0,.12);  stroke: rgba(181,137,0,.5); }
      .arr { stroke: #93a1a1; stroke-width: 1; fill: none; }
      text { font-family: 'Roboto', sans-serif; }
    </style>
  </defs>


      <defs>
        <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <rect x="10" y="20" width="72" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="46" y="36" text-anchor="middle" dominant-baseline="central" class="t-base">Caller</text>

      <line x1="82" y1="36" x2="116" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr2)"/>

      <rect x="116" y="20" width="96" height="32" rx="5" class="n-green" stroke-width="0.6"/>
      <text x="164" y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--green)">Bulkhead</text>
      <text x="164" y="15" text-anchor="middle" class="t-green" style="font-size:10px">슬롯 획득</text>

      <line x1="212" y1="36" x2="246" y2="36" stroke="#859900" stroke-width="1" marker-end="url(#arr2)"/>

      <!-- slot bracket -->
      <rect x="246" y="8" width="200" height="52" rx="6" fill="none" stroke="#b58900" stroke-width="0.7" stroke-dasharray="4 3"/>
      <text x="346" y="5" text-anchor="middle" class="t-amber" style="font-size:10px">슬롯 점유 중 (실행 내내)</text>

      <rect x="252" y="20" width="90" height="32" rx="5" class="n-purple" stroke-width="0.6"/>
      <text x="297" y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--purple)">Method()</text>

      <line x1="342" y1="36" x2="376" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr2)"/>

      <rect x="376" y="20" width="72" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="412" y="36" text-anchor="middle" dominant-baseline="central" class="t-base">External</text>

      <!-- slot release -->
      <path d="M448 36 Q476 36 476 78 Q476 90 164 90" fill="none" stroke="#b58900" stroke-width="0.7" stroke-dasharray="4 3" marker-end="url(#arr2)"/>
      <text x="370" y="102" text-anchor="middle" class="t-amber" style="font-size:10px">슬롯 반환 (성공/실패 무관)</text>

      <!-- reject -->
      <line x1="164" y1="52" x2="164" y2="100" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr2)"/>
      <rect x="116" y="100" width="96" height="14" rx="4" class="n-red" stroke-width="0.6"/>
      <text x="164" y="107" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--red);font-size:10px">BulkheadFullException</text>
    
</svg>