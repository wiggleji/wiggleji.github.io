<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 108" width="640" xmlns="http://www.w3.org/2000/svg"
     style="background:#fffefc; font-family:'Roboto',sans-serif;">

  <defs>
    <style>
      .t-base  { fill: #586e75; font-family: 'Roboto', sans-serif; font-size: 12px; }
      .t-green { fill: #859900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-red   { fill: #dc322f; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-amber { fill: #b58900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-muted { fill: #93a1a1; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-mono  { fill: #657b83; font-family: 'Roboto Mono', monospace; font-size: 10.5px; }
      .n-gray   { fill: #e4deca; stroke: #c5bcaa; }
      .n-green  { fill: rgba(133,153,0,.12);  stroke: rgba(133,153,0,.5); }
      .n-teal   { fill: rgba(42,161,152,.12); stroke: rgba(42,161,152,.5); }
      .n-purple { fill: rgba(108,113,196,.12);stroke: rgba(108,113,196,.5); }
      .n-red    { fill: rgba(220,50,47,.12);  stroke: rgba(220,50,47,.5); }
      .n-amber  { fill: rgba(181,137,0,.12);  stroke: rgba(181,137,0,.5); }
      .arr { stroke: #93a1a1; stroke-width: 1; fill: none; }
      text { font-family: 'Roboto', sans-serif; }
    </style>
  </defs>


      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <!-- happy path -->
      <rect x="10" y="18" width="72" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="46" y="34" text-anchor="middle" dominant-baseline="central" class="t-base">Caller</text>

      <line x1="82" y1="34" x2="120" y2="34" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr)"/>

      <rect x="120" y="18" width="116" height="32" rx="5" class="n-teal" stroke-width="0.6"/>
      <text x="178" y="34" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--teal)">Rate Limiter</text>

      <text x="178" y="14" text-anchor="middle" class="t-green">quota 여유 →</text>
      <line x1="236" y1="34" x2="274" y2="34" stroke="#859900" stroke-width="1" marker-end="url(#arr)"/>

      <rect x="274" y="18" width="96" height="32" rx="5" class="n-purple" stroke-width="0.6"/>
      <text x="322" y="34" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--purple)">Method()</text>

      <line x1="370" y1="34" x2="408" y2="34" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr)"/>

      <rect x="408" y="18" width="80" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="448" y="34" text-anchor="middle" dominant-baseline="central" class="t-base">External</text>

      <!-- reject path -->
      <line x1="178" y1="50" x2="178" y2="70" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr)"/>
      <rect x="120" y="70" width="116" height="28" rx="5" class="n-red" stroke-width="0.6"/>
      <text x="178" y="84" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--red);font-size:11px">RequestNotPermitted</text>
      <text x="248" y="66" class="t-red">quota 초과 시 즉시 예외</text>
    
</svg>