<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 670 210" width="670" xmlns="http://www.w3.org/2000/svg"
     style="background:#fffefc; font-family:'Roboto',sans-serif;">

  <defs>
    <style>
      .t-base  { fill: #586e75; font-family: 'Roboto', sans-serif; font-size: 12px; }
      .t-green { fill: #859900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-red   { fill: #dc322f; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-amber { fill: #b58900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-muted { fill: #93a1a1; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-mono  { fill: #657b83; font-family: 'Roboto Mono', monospace; font-size: 10.5px; }
      .n-gray   { fill: #e4deca; stroke: #c5bcaa; }
      .n-green  { fill: rgba(133,153,0,.12);  stroke: rgba(133,153,0,.5); }
      .n-teal   { fill: rgba(42,161,152,.12); stroke: rgba(42,161,152,.5); }
      .n-purple { fill: rgba(108,113,196,.12);stroke: rgba(108,113,196,.5); }
      .n-red    { fill: rgba(220,50,47,.12);  stroke: rgba(220,50,47,.5); }
      .n-amber  { fill: rgba(181,137,0,.12);  stroke: rgba(181,137,0,.5); }
      .arr { stroke: #93a1a1; stroke-width: 1; fill: none; }
      text { font-family: 'Roboto', sans-serif; }
    </style>
  </defs>



      <!-- time axis label -->
      <text x="16" y="38" font-family="'Roboto Mono',monospace" font-size="10" fill="#93a1a1">시간 →</text>
      <line x1="16" y1="44" x2="624" y2="44" stroke="#d3cbb8" stroke-width="1"/>

      <!-- slot lane labels -->
      <text x="16" y="64"  font-family="'Roboto Mono',monospace" font-size="10" fill="#93a1a1">slot 1</text>
      <text x="16" y="94"  font-family="'Roboto Mono',monospace" font-size="10" fill="#93a1a1">slot 2</text>
      <text x="16" y="124" font-family="'Roboto Mono',monospace" font-size="10" fill="#93a1a1">slot 3</text>
      <text x="16" y="154" font-family="'Roboto Mono',monospace" font-size="10" fill="#93a1a1">req 4</text>
      <text x="16" y="184" font-family="'Roboto Mono',monospace" font-size="10" fill="#93a1a1">req 5</text>

      <!-- slot lane baselines -->
      <line x1="64" y1="58"  x2="624" y2="58"  stroke="#e8eaf0" stroke-width="0.5"/>
      <line x1="64" y1="88"  x2="624" y2="88"  stroke="#e8eaf0" stroke-width="0.5"/>
      <line x1="64" y1="118" x2="624" y2="118" stroke="#e8eaf0" stroke-width="0.5"/>
      <line x1="64" y1="148" x2="624" y2="148" stroke="#e8eaf0" stroke-width="0.5"/>
      <line x1="64" y1="178" x2="624" y2="178" stroke="#e8eaf0" stroke-width="0.5"/>

      <!-- slot 1: req A occupies from t=0 to t=280 (long running) -->
      <rect x="64"  y="50" width="280" height="16" rx="3" fill="rgba(133,153,0,.13)" stroke="#859900" stroke-width="0.7"/>
      <text x="204" y="58" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#859900">req A (실행 중 — 슬롯 점유)</text>

      <!-- slot 2: req B occupies from t=20 to t=200 -->
      <rect x="84"  y="80" width="200" height="16" rx="3" fill="rgba(133,153,0,.13)" stroke="#859900" stroke-width="0.7"/>
      <text x="184" y="88" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#859900">req B (실행 중)</text>

      <!-- slot 3: req C occupies from t=40 to t=340 (very slow) -->
      <rect x="104" y="110" width="340" height="16" rx="3" fill="rgba(133,153,0,.13)" stroke="#859900" stroke-width="0.7"/>
      <text x="274" y="118" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#859900">req C (느린 외부 서비스 — 슬롯 장기 점유)</text>

      <!-- req 4 arrives at t=60, all slots full → waits maxWaitDuration -->
      <!-- wait bar t=60 to t=60+maxWait (80px wide = 200ms) -->
      <rect x="124" y="140" width="80" height="16" rx="3" fill="rgba(181,137,0,.1)" stroke="#b58900" stroke-width="0.7" stroke-dasharray="3 2"/>
      <text x="164" y="148" text-anchor="middle" dominant-baseline="central" font-family="'Roboto Mono',monospace" font-size="9" fill="#b58900">maxWaitDuration</text>
      <!-- after wait: slot freed by B at t=284 → req4 gets slot -->
      <rect x="284" y="140" width="160" height="16" rx="3" fill="rgba(133,153,0,.13)" stroke="#859900" stroke-width="0.7"/>
      <text x="364" y="148" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#859900">req D (슬롯 확보 후 실행)</text>

      <!-- req 5 arrives at t=80, all slots still full → wait → times out → exception -->
      <rect x="144" y="170" width="80" height="16" rx="3" fill="rgba(181,137,0,.1)" stroke="#b58900" stroke-width="0.7" stroke-dasharray="3 2"/>
      <text x="184" y="178" text-anchor="middle" dominant-baseline="central" font-family="'Roboto Mono',monospace" font-size="9" fill="#b58900">maxWaitDuration</text>
      <!-- timeout marker -->
      <rect x="224" y="170" width="20" height="16" rx="3" fill="rgba(220,50,47,.1)" stroke="#dc322f" stroke-width="0.7"/>
      <text x="234" y="178" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#dc322f">!</text>
      <text x="248" y="185" font-family="'Roboto',sans-serif" font-size="9" fill="#dc322f">BulkheadFullException</text>

      <!-- slot released markers (vertical dashes) -->
      <!-- slot 2 released at t=200 (x=284) -->
      <line x1="284" y1="46" x2="284" y2="160" stroke="#859900" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.5"/>
      <text x="284" y="168" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#859900">slot 반환</text>

      <!-- maxConcurrentCalls brace on right -->
      <line x1="610" y1="50"  x2="620" y2="50"  stroke="#859900" stroke-width="0.8"/>
      <line x1="620" y1="50"  x2="620" y2="126" stroke="#859900" stroke-width="0.8"/>
      <line x1="610" y1="126" x2="620" y2="126" stroke="#859900" stroke-width="0.8"/>
      <text x="624" y="88" dominant-baseline="central" font-family="'Roboto Mono',monospace" font-size="9" fill="#859900">max=3</text>

      <!-- legend -->
      <rect x="16"  y="196" width="12" height="10" rx="2" fill="rgba(133,153,0,.13)"   stroke="#859900" stroke-width="0.7"/>
      <text x="32"  y="201" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="11" fill="#657b83">슬롯 점유 (실행 중)</text>
      <rect x="160" y="196" width="12" height="10" rx="2" fill="rgba(181,137,0,.1)"  stroke="#b58900" stroke-width="0.7" stroke-dasharray="3 2"/>
      <text x="176" y="201" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="11" fill="#657b83">maxWaitDuration 대기</text>
      <rect x="320" y="196" width="12" height="10" rx="2" fill="rgba(220,50,47,.1)" stroke="#dc322f" stroke-width="0.7"/>
      <text x="336" y="201" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="11" fill="#657b83">BulkheadFullException</text>
    
</svg>