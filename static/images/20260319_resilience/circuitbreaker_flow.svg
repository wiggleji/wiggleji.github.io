<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 208" width="640" xmlns="http://www.w3.org/2000/svg"
     style="background:#fffefc; font-family:'Roboto',sans-serif;">

  <defs>
    <style>
      .t-base  { fill: #586e75; font-family: 'Roboto', sans-serif; font-size: 12px; }
      .t-green { fill: #859900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-red   { fill: #dc322f; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-amber { fill: #b58900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-muted { fill: #93a1a1; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-mono  { fill: #657b83; font-family: 'Roboto Mono', monospace; font-size: 10.5px; }
      .n-gray   { fill: #e4deca; stroke: #c5bcaa; }
      .n-green  { fill: rgba(133,153,0,.12);  stroke: rgba(133,153,0,.5); }
      .n-teal   { fill: rgba(42,161,152,.12); stroke: rgba(42,161,152,.5); }
      .n-purple { fill: rgba(108,113,196,.12);stroke: rgba(108,113,196,.5); }
      .n-red    { fill: rgba(220,50,47,.12);  stroke: rgba(220,50,47,.5); }
      .n-amber  { fill: rgba(181,137,0,.12);  stroke: rgba(181,137,0,.5); }
      .arr { stroke: #93a1a1; stroke-width: 1; fill: none; }
      text { font-family: 'Roboto', sans-serif; }
    </style>
  </defs>


      <defs>
        <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- CLOSED row -->
      <text x="10" y="14" class="t-muted">① CLOSED — 정상 운영</text>
      <rect x="10" y="20" width="64" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="42" y="36" text-anchor="middle" dominant-baseline="central" class="t-base">Caller</text>

      <line x1="74" y1="36" x2="106" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr3)"/>

      <rect x="106" y="20" width="104" height="32" rx="5" class="n-green" stroke-width="0.6"/>
      <text x="158" y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--green)">CB: CLOSED</text>

      <line x1="210" y1="36" x2="244" y2="36" stroke="#859900" stroke-width="1" marker-end="url(#arr3)"/>

      <rect x="244" y="20" width="90" height="32" rx="5" class="n-purple" stroke-width="0.6"/>
      <text x="289" y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--purple)">Method()</text>

      <line x1="334" y1="36" x2="368" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr3)"/>

      <rect x="368" y="20" width="72" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="404" y="36" text-anchor="middle" dominant-baseline="central" class="t-base">External</text>

      <!-- result back to CB -->
      <path d="M368 48 Q308 76 210 58" fill="none" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr3)"/>
      <text x="296" y="76" text-anchor="middle" class="t-muted">결과 기록 → sliding window</text>

      <!-- OPEN row -->
      <text x="10" y="106" class="t-muted">② OPEN — 차단</text>
      <rect x="10" y="112" width="64" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="42" y="128" text-anchor="middle" dominant-baseline="central" class="t-base">Caller</text>

      <line x1="74" y1="128" x2="106" y2="128" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr3)"/>

      <rect x="106" y="112" width="104" height="32" rx="5" class="n-red" stroke-width="0.6"/>
      <text x="158" y="128" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--red)">CB: OPEN</text>

      <!-- to fallback -->
      <line x1="158" y1="144" x2="158" y2="166" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr3)"/>
      <rect x="106" y="166" width="104" height="30" rx="5" class="n-red" stroke-width="0.6"/>
      <text x="158" y="181" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--red);font-size:11px">fallback()</text>

      <!-- method greyed -->
      <rect x="244" y="112" width="90" height="32" rx="5" fill="rgba(88,110,117,.06)" stroke="var(--border)" stroke-width="0.6"/>
      <text x="289" y="128" text-anchor="middle" dominant-baseline="central" class="t-muted" style="opacity:.4">Method()</text>
      <line x1="234" y1="120" x2="248" y2="136" stroke="var(--red)" stroke-width="1.5"/>
      <line x1="248" y1="120" x2="234" y2="136" stroke="var(--red)" stroke-width="1.5"/>
      <text x="256" y="122" class="t-red">CallNotPermitted</text>

      <!-- state machine hint -->
      <rect x="486" y="102" width="148" height="104" rx="6" fill="rgba(88,110,117,.04)" stroke="#d3cbb8" stroke-width="0.8"/>
      <text x="560" y="117" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#93a1a1" letter-spacing="0.05em">STATE MACHINE</text>
      <line x1="486" y1="121" x2="634" y2="121" stroke="#d3cbb8" stroke-width="0.5"/>
      <text x="560" y="136" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="11" font-weight="500" fill="#859900">CLOSED</text>
      <text x="560" y="149" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="10" fill="#93a1a1">↓ 실패율 ≥ threshold</text>
      <text x="560" y="163" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="11" font-weight="500" fill="#dc322f">OPEN</text>
      <text x="560" y="176" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="10" fill="#93a1a1">↓ waitDuration 경과</text>
      <text x="560" y="196" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="11" font-weight="500" fill="#b58900">HALF-OPEN</text>
    
</svg>