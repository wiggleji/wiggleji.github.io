<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 196" width="640" xmlns="http://www.w3.org/2000/svg"
     style="background:#fffefc; font-family:'Roboto',sans-serif;">

  <defs>
    <style>
      .t-base  { fill: #586e75; font-family: 'Roboto', sans-serif; font-size: 12px; }
      .t-green { fill: #859900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-red   { fill: #dc322f; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-amber { fill: #b58900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-muted { fill: #93a1a1; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-mono  { fill: #657b83; font-family: 'Roboto Mono', monospace; font-size: 10.5px; }
      .n-gray   { fill: #e4deca; stroke: #c5bcaa; }
      .n-green  { fill: rgba(133,153,0,.12);  stroke: rgba(133,153,0,.5); }
      .n-teal   { fill: rgba(42,161,152,.12); stroke: rgba(42,161,152,.5); }
      .n-purple { fill: rgba(108,113,196,.12);stroke: rgba(108,113,196,.5); }
      .n-red    { fill: rgba(220,50,47,.12);  stroke: rgba(220,50,47,.5); }
      .n-amber  { fill: rgba(181,137,0,.12);  stroke: rgba(181,137,0,.5); }
      .arr { stroke: #93a1a1; stroke-width: 1; fill: none; }
      text { font-family: 'Roboto', sans-serif; }
    </style>
  </defs>



      <!-- ── Period 1 ── -->
      <!-- limitRefreshPeriod bracket -->
      <line x1="16"  y1="36" x2="16"  y2="44" stroke="#2aa198" stroke-width="1"/>
      <line x1="16"  y1="40" x2="316" y2="40" stroke="#2aa198" stroke-width="1"/>
      <line x1="316" y1="36" x2="316" y2="44" stroke="#2aa198" stroke-width="1"/>
      <text x="166" y="35" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="10" fill="#2aa198">limitRefreshPeriod (1s)</text>

      <!-- time axis -->
      <line x1="16" y1="58" x2="620" y2="58" stroke="#d3cbb8" stroke-width="1"/>

      <!-- quota slots period 1: 5 filled (limitForPeriod=5, all used) -->
      <!-- slot width=36, gap=8, start=16 -->
      <!-- slot 1 -->
      <rect x="16"  y="64" width="36" height="22" rx="4" fill="rgba(42,161,152,.12)" stroke="#2aa198" stroke-width="0.8"/>
      <text x="34"  y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#2aa198">req</text>
      <!-- slot 2 -->
      <rect x="60"  y="64" width="36" height="22" rx="4" fill="rgba(42,161,152,.12)" stroke="#2aa198" stroke-width="0.8"/>
      <text x="78"  y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#2aa198">req</text>
      <!-- slot 3 -->
      <rect x="104" y="64" width="36" height="22" rx="4" fill="rgba(42,161,152,.12)" stroke="#2aa198" stroke-width="0.8"/>
      <text x="122" y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#2aa198">req</text>
      <!-- slot 4 -->
      <rect x="148" y="64" width="36" height="22" rx="4" fill="rgba(42,161,152,.12)" stroke="#2aa198" stroke-width="0.8"/>
      <text x="166" y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#2aa198">req</text>
      <!-- slot 5 (last allowed) -->
      <rect x="192" y="64" width="36" height="22" rx="4" fill="rgba(42,161,152,.12)" stroke="#2aa198" stroke-width="0.8"/>
      <text x="210" y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#2aa198">req</text>

      <!-- limitForPeriod label -->
      <line x1="16"  y1="94" x2="16"  y2="100" stroke="#2aa198" stroke-width="0.8" stroke-dasharray="2 2"/>
      <line x1="228" y1="94" x2="228" y2="100" stroke="#2aa198" stroke-width="0.8" stroke-dasharray="2 2"/>
      <line x1="16"  y1="97" x2="228" y2="97"  stroke="#2aa198" stroke-width="0.8" stroke-dasharray="2 2"/>
      <text x="122" y="110" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="10" fill="#2aa198">limitForPeriod = 5</text>

      <!-- 6th req arrives — quota exhausted, enters wait -->
      <rect x="236" y="64" width="36" height="22" rx="4" fill="rgba(181,137,0,.09)" stroke="#b58900" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="254" y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#b58900">req6</text>

      <!-- timeoutDuration wait bar -->
      <rect x="236" y="92" width="56" height="14" rx="3" fill="rgba(181,137,0,.1)" stroke="#b58900" stroke-width="0.7"/>
      <text x="264" y="99" text-anchor="middle" dominant-baseline="central" font-family="'Roboto Mono',monospace" font-size="9" fill="#b58900">timeoutDuration</text>
      <line x1="236" y1="86" x2="236" y2="92" stroke="#b58900" stroke-width="0.7" stroke-dasharray="2 2"/>
      <line x1="292" y1="86" x2="292" y2="92" stroke="#b58900" stroke-width="0.7" stroke-dasharray="2 2"/>

      <!-- period boundary -->
      <line x1="316" y1="50" x2="316" y2="116" stroke="#d3cbb8" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="316" y="124" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="10" fill="#93a1a1">reset</text>

      <!-- req6 times out before reset → exception -->
      <rect x="282" y="64" width="20" height="22" rx="4" fill="rgba(220,50,47,.08)" stroke="#dc322f" stroke-width="0.8"/>
      <text x="292" y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="13" fill="#dc322f">✕</text>
      <text x="292" y="113" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="9" fill="#dc322f">예외</text>

      <!-- ── Period 2 ── -->
      <line x1="316" y1="36" x2="316" y2="44" stroke="#2aa198" stroke-width="1"/>
      <line x1="316" y1="40" x2="616" y2="40" stroke="#2aa198" stroke-width="1"/>
      <line x1="616" y1="36" x2="616" y2="44" stroke="#2aa198" stroke-width="1"/>
      <text x="466" y="35" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="10" fill="#2aa198">limitRefreshPeriod (1s) — 리셋</text>

      <!-- period 2 slots: quota refills, 3 new requests come in -->
      <rect x="326" y="64" width="36" height="22" rx="4" fill="rgba(42,161,152,.12)" stroke="#2aa198" stroke-width="0.8"/>
      <text x="344" y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#2aa198">req</text>
      <rect x="370" y="64" width="36" height="22" rx="4" fill="rgba(42,161,152,.12)" stroke="#2aa198" stroke-width="0.8"/>
      <text x="388" y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#2aa198">req</text>
      <rect x="414" y="64" width="36" height="22" rx="4" fill="rgba(42,161,152,.12)" stroke="#2aa198" stroke-width="0.8"/>
      <text x="432" y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#2aa198">req</text>

      <!-- remaining 2 slots empty (unused) -->
      <rect x="458" y="64" width="36" height="22" rx="4" fill="none" stroke="#d3cbb8" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="476" y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#c5bcaa">—</text>
      <rect x="502" y="64" width="36" height="22" rx="4" fill="none" stroke="#d3cbb8" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="520" y="75" text-anchor="middle" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="10" fill="#c5bcaa">—</text>

      <!-- legend -->
      <rect x="16"  y="148" width="14" height="12" rx="2" fill="rgba(42,161,152,.12)" stroke="#2aa198" stroke-width="0.8"/>
      <text x="36"  y="154" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="11" fill="#657b83">허용된 요청 (슬롯 소비)</text>

      <rect x="170" y="148" width="14" height="12" rx="2" fill="none" stroke="#d3cbb8" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="190" y="154" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="11" fill="#657b83">미사용 슬롯 (period 종료 시 소멸)</text>

      <rect x="16"  y="170" width="14" height="12" rx="2" fill="rgba(181,137,0,.1)" stroke="#b58900" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="36"  y="176" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="11" fill="#657b83">대기 중 요청 (timeoutDuration 소진 → 예외)</text>

      <rect x="350" y="170" width="14" height="12" rx="2" fill="rgba(220,50,47,.08)" stroke="#dc322f" stroke-width="0.6"/>
      <text x="370" y="176" dominant-baseline="central" font-family="'Roboto',sans-serif" font-size="11" fill="#657b83">RequestNotPermittedException</text>
    
</svg>