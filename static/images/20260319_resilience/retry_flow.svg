<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 148" width="640" xmlns="http://www.w3.org/2000/svg"
     style="background:#fffefc; font-family:'Roboto',sans-serif;">

  <defs>
    <style>
      .t-base  { fill: #586e75; font-family: 'Roboto', sans-serif; font-size: 12px; }
      .t-green { fill: #859900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-red   { fill: #dc322f; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-amber { fill: #b58900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-muted { fill: #93a1a1; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-mono  { fill: #657b83; font-family: 'Roboto Mono', monospace; font-size: 10.5px; }
      .n-gray   { fill: #e4deca; stroke: #c5bcaa; }
      .n-green  { fill: rgba(133,153,0,.12);  stroke: rgba(133,153,0,.5); }
      .n-teal   { fill: rgba(42,161,152,.12); stroke: rgba(42,161,152,.5); }
      .n-purple { fill: rgba(108,113,196,.12);stroke: rgba(108,113,196,.5); }
      .n-red    { fill: rgba(220,50,47,.12);  stroke: rgba(220,50,47,.5); }
      .n-amber  { fill: rgba(181,137,0,.12);  stroke: rgba(181,137,0,.5); }
      .arr { stroke: #93a1a1; stroke-width: 1; fill: none; }
      text { font-family: 'Roboto', sans-serif; }
    </style>
  </defs>


      <defs>
        <marker id="arr5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <rect x="10" y="20" width="64" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="42" y="36" text-anchor="middle" dominant-baseline="central" class="t-base">Caller</text>

      <line x1="74" y1="36" x2="106" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr5)"/>

      <rect x="106" y="20" width="64" height="32" rx="5" fill="rgba(108,113,196,.1)" stroke="rgba(108,113,196,.5)" stroke-width="0.6"/>
      <text x="138" y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--purple)">Retry</text>

      <line x1="170" y1="36" x2="204" y2="36" stroke="#6c71c4" stroke-width="1" marker-end="url(#arr5)"/>

      <rect x="204" y="20" width="90" height="32" rx="5" class="n-purple" stroke-width="0.6"/>
      <text x="249" y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--purple)">Method()</text>

      <line x1="294" y1="36" x2="328" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr5)"/>

      <rect x="328" y="20" width="72" height="32" rx="5" class="n-gray" stroke-width="0.6"/>
      <text x="364" y="36" text-anchor="middle" dominant-baseline="central" class="t-base">External</text>

      <!-- exception back -->
      <path d="M328 48 Q272 72 204 54" fill="none" stroke="#dc322f" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr5)"/>
      <text x="274" y="72" text-anchor="middle" class="t-red" style="font-size:10px">Exception 반환</text>

      <!-- retry loop -->
      <path d="M204 54 Q186 104 138 104 Q106 104 106 86 Q106 68 138 68" fill="none" stroke="#b58900" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr5)"/>
      <text x="116" y="118" class="t-amber" style="font-size:10px">backoff 후 재시도 (attempt 2, 3...)</text>

      <!-- max exceeded -->
      <line x1="138" y1="52" x2="138" y2="132" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr5)"/>
      <rect x="90" y="132" width="130" height="14" rx="4" class="n-red" stroke-width="0.6"/>
      <text x="155" y="139" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--red);font-size:10px">maxAttempts 초과 → 예외 전파</text>

      <!-- success -->
      <line x1="294" y1="20" x2="438" y2="20" stroke="#859900" stroke-width="0.8" marker-end="url(#arr5)"/>
      <rect x="438" y="6" width="100" height="28" rx="5" class="n-green" stroke-width="0.6"/>
      <text x="488" y="20" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--green);font-size:11px">성공 → 루프 탈출</text>
    
</svg>